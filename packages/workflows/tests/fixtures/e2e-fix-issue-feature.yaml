name: fix-issue
description: E2E stub — fix-issue with feature classification

nodes:
  - id: classify
    script: 'echo ''{"issue_number":99,"issue_type":"feature","title":"add widget","complexity":"moderate"}'''

  - id: investigate
    script: "echo 'investigated'"
    depends_on: [classify]
    when: "$classify.output.issue_type == 'bug'"

  - id: plan
    script: "echo 'plan created'"
    depends_on: [classify]
    when: "$classify.output.issue_type != 'bug'"

  - id: bridge-artifacts
    script: "echo 'artifacts bridged'"
    depends_on: [investigate, plan]
    trigger_rule: one_success

  - id: implement
    script: "echo 'feature implemented'"
    depends_on: [bridge-artifacts]

  - id: validate
    script: "echo 'all tests pass'"
    depends_on: [implement]
